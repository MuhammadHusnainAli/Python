<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python In Depth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh
        }

        .roadmap {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2c2c2c;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 3;
            background: #ffffff;
            padding: 10px 0 20px
        }

        .spine {
            position: relative;
            padding-top: 10px
        }

        .spine::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 30px;
            bottom: 0;
            width: 3px;
            background: #1d4ed8;
            transform: translateX(-50%);
            z-index: 0
        }

        .section-label {
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            background: #1d4ed8;
            margin: 30px auto 15px;
            padding: 8px 28px;
            border-radius: 8px;
            position: relative;
            z-index: 2;
            letter-spacing: 0.4px;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(29,78,216,0.3)
        }

        .section {
            margin-bottom: 10px;
            position: relative;
            text-align: center
        }

        .topic-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            position: relative;
            z-index: 1
        }

        .side {
            flex: 1;
            display: flex
        }

        .side.left {
            justify-content: flex-end
        }

        .side.right {
            justify-content: flex-start
        }

        .center-col {
            width: 240px;
            min-width: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2
        }

        .yellow-node {
            background: linear-gradient(135deg, #34d399, #10b981);
            border: 2px solid #059669;
            border-radius: 10px;
            padding: 10px 22px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            color: #2c2c2c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            white-space: nowrap;
            position: relative;
            z-index: 2
        }

        .leaf-group {
            display: flex;
            align-items: center
        }

        .leaf-group.right-group {
            flex-direction: row
        }

        .leaf-group.left-group {
            flex-direction: row-reverse
        }

        .leaves {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .leaf {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid #6ee7b7;
            border-radius: 8px;
            padding: 7px 16px;
            font-size: 12.5px;
            text-align: center;
            white-space: nowrap;
            color: #3a3a3a;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
            position: relative
        }

        .bracket {
            position: relative;
            width: 50px;
            min-width: 50px;
            align-self: stretch;
            display: flex;
            align-items: center
        }

        .bracket .v-line {
            position: absolute;
            top: 14px;
            bottom: 14px;
            width: 0;
            border-left: 2px dashed #1d4ed8
        }

        .bracket.right-bracket .v-line {
            left: 0
        }

        .bracket.left-bracket .v-line {
            right: 0
        }

        .bracket .h-arm {
            position: absolute;
            top: 50%;
            height: 0;
            border-top: 2px dashed #1d4ed8
        }

        .bracket.right-bracket .h-arm {
            right: 0;
            left: 0
        }

        .bracket.left-bracket .h-arm {
            left: 0;
            right: 0
        }

        .leaf-group.right-group .leaf::before {
            content: '';
            position: absolute;
            left: -14px;
            top: 50%;
            width: 12px;
            border-top: 2px dashed #1d4ed8
        }

        .leaf-group.left-group .leaf::after {
            content: '';
            position: absolute;
            right: -14px;
            top: 50%;
            width: 12px;
            border-top: 2px dashed #1d4ed8
        }

        .node-connector {
            width: 30px;
            min-width: 30px;
            display: flex;
            align-items: center
        }

        .node-connector .h-line {
            width: 100%;
            border-top: 2px dashed #1d4ed8
        }

        .empty-side {
            flex: 1
        }

        @media(max-width:1000px) {
            .roadmap {
                padding: 20px 5px
            }

            .leaf {
                font-size: 11px;
                padding: 5px 10px
            }

            .yellow-node {
                font-size: 12px;
                padding: 8px 14px
            }

            .center-col {
                width: 180px;
                min-width: 180px
            }
        }
    </style>
</head>

<body>
    <div class="roadmap">
        <h1 class="title">Python In Depth</h1>
        <div class="spine" id="spine"></div>
    </div>
    <script>
        var sections = [
            {
                name: "Python Fundamentals", topics: [
                    { name: "Variables and Data Types", side: "right", children: ["Integer", "Float", "Complex", "String", "Boolean", "Type Casting", "Dynamic Typing"] },
                    { name: "Operators and Expressions", side: "left", children: ["Arithmetic", "Comparison", "Logical", "Bitwise", "Assignment", "Identity", "Membership"] }
                ]
            },
            {
                name: "Control Flow", topics: [
                    { name: "Conditional Statements", side: "right", children: ["If Statement", "Elif Clause", "Else Clause", "Ternary Operator", "Nested Conditions", "Match Statement", "Pattern Matching"] },
                    { name: "Loops and Iteration", side: "left", children: ["For Loop", "While Loop", "Break Statement", "Continue Statement", "Else in Loops", "Range Function", "Enumerate Function"] }
                ]
            },
            {
                name: "Functions and Scope", topics: [
                    { name: "Function Basics", side: "right", children: ["Function Definition", "Parameters", "Return Values", "Default Arguments", "Keyword Arguments", "Variable Length Args", "Unpacking Arguments"] },
                    { name: "Advanced Functions", side: "left", children: ["Lambda Functions", "Higher Order Functions", "Closures", "Function Annotations", "Recursion", "Tail Recursion", "Call Stack Mechanics"] },
                    { name: "Scope and Namespaces", side: "right", children: ["Local Scope", "Enclosing Scope", "Global Scope", "Built In Scope", "LEGB Rule", "Global Keyword", "Nonlocal Keyword"] }
                ]

            {

                    { name: "Inheritance and Polymorphism", side: "left", children: ["Single Inheritance", "Multiple Inheritance", "Method Resolution Order", "Super Function", "Method Overriding", "Abstract Classes", "Interfaces"] },
                    { name: "Encapsulation and Special Methods", side: "right", children: ["Name Mangling", "Property Decorator", "Getters and Setters", "Dunder Methods", "Operator Overloading", "String Representation", "Comparison Methods"] },
                    { name: "Advanced OOP", side: "left", children: ["Metaclasses", "Class Factories", "Slots Optimization", "Descriptors Protocol", "Data Classes", "Named Tuples", "Mixin Classes"] }
                ]
            },
            {
                name: "Decorators Deep Dive", topics: [
                    { name: "Decorator Fundamentals", side: "right", children: ["Function Decorators", "Wrapping Functions", "Functools Wraps", "Decorator Syntax Sugar", "Preserving Metadata", "Stacking Decorators", "Decorator Execution Order"] },
                    { name: "Advanced Decorators", side: "left", children: ["Decorators with Arguments", "Class Decorators", "Method Decorators", "Static Method Decorator", "Class Method Decorator", "Property Decorator Internals", "Descriptor Based Decorators"] }
                ]
            },
            {
                name: "Memory Management", topics: [
                    { name: "Object Model Internals", side: "right", children: ["Everything Is Object", "PyObject Structure", "Reference Counting", "Object Identity", "Object Lifetime", "Interning Mechanism", "Small Integer Cache"] },
                    { name: "Garbage Collection", side: "left", children: ["Reference Counting Mechanism", "Cyclic References", "Generational GC", "GC Module Interface", "Collection Thresholds", "Manual GC Triggers", "GC Performance Tuning"] },
                    { name: "References and Copying", side: "right", children: ["Strong References", "Weak References", "Weakref Module", "Weak Value Dictionary", "Shallow Copy", "Deep Copy", "Copy Module Internals"] },
                    { name: "Memory Optimization", side: "left", children: ["Memory Profiling Tools", "Sys Getsizeof", "Tracemalloc Module", "Memory Pools", "Object Reuse Patterns", "Slots for Memory", "Generator Memory Benefits"] }
                ]
            },
            {
                name: "Iterators and Generators", topics: [
                    { name: "Iterator Protocol", side: "right", children: ["Iterable Interface", "Iterator Interface", "Iter Method", "Next Method", "StopIteration", "Custom Iterators", "Infinite Iterators"] },
                    { name: "Generators", side: "left", children: ["Generator Functions", "Yield Statement", "Yield From", "Generator Expressions", "Lazy Evaluation", "Send Method", "Generator Pipelines"] },
                    { name: "Itertools Module", side: "right", children: ["Chain Function", "Product Function", "Permutations", "Combinations", "Groupby Function", "Accumulate Function", "Islice Function"] }
                ]
            },
            {
                name: "Data Structures Built In", topics: [
                    { name: "Sequences", side: "right", children: ["List Internals", "Tuple Internals", "String Internals", "Byte Arrays", "Array Module", "Deque Implementation", "Named Tuple"] },
                    { name: "Mappings and Sets", side: "left", children: ["Dict Internals", "Hash Table Mechanism", "Dict Ordering", "Default Dict", "Ordered Dict", "Counter Class", "Set Implementation"] },
                    { name: "Comprehensions", side: "right", children: ["List Comprehension", "Dict Comprehension", "Set Comprehension", "Nested Comprehension", "Conditional Comprehension", "Walrus Operator", "Generator Expression"] }
                ]
            },
            {
                name: "Data Structures and Algorithms", topics: [
                    { name: "Arrays and Strings", side: "right", children: ["Two Pointer Technique", "Sliding Window", "Prefix Sum", "Kadane Algorithm", "String Matching", "Binary Search", "Sorting Algorithms"] },
                    { name: "Linked Lists and Stacks", side: "left", children: ["Singly Linked List", "Doubly Linked List", "Stack Implementation", "Queue Implementation", "Priority Queue", "Monotonic Stack", "LRU Cache"] },
                    { name: "Trees and Graphs", side: "right", children: ["Binary Tree Traversal", "Binary Search Tree", "AVL Tree", "Heap Data Structure", "Trie Data Structure", "Graph Representation", "BFS and DFS"] },
                    { name: "Advanced Algorithms", side: "left", children: ["Dynamic Programming", "Greedy Algorithms", "Backtracking", "Divide and Conquer", "Topological Sort", "Shortest Path Algorithms", "Minimum Spanning Tree"] }
                ]
            },
            {
                name: "Concurrency and Parallelism", topics: [
                    { name: "Threading", side: "right", children: ["Thread Module", "Thread Creation", "Thread Synchronization", "Locks and Semaphores", "Deadlock Prevention", "Thread Local Data", "Global Interpreter Lock"] },
                    { name: "Multiprocessing", side: "left", children: ["Process Creation", "Process Pool", "Shared Memory", "Inter Process Communication", "Pipes and Queues", "Manager Objects", "Process Synchronization"] },
                    { name: "Async Programming", side: "right", children: ["Event Loop", "Coroutines", "Async Await Syntax", "Asyncio Module", "Aiohttp Library", "Async Generators", "Task Scheduling"] }
                ]
            },
            {
                name: "Error Handling and Debugging", topics: [
                    { name: "Exception Handling", side: "right", children: ["Try Except Block", "Multiple Exceptions", "Finally Clause", "Else Clause", "Raise Statement", "Custom Exceptions", "Exception Chaining"] },
                    { name: "Debugging Techniques", side: "left", children: ["PDB Debugger", "Breakpoint Function", "Logging Module", "Assertions", "Traceback Module", "Warnings Module", "Profiling with cProfile"] }
                ]
            },
            {
                name: "File IO and Serialization", topics: [
                    { name: "File Operations", side: "right", children: ["File Open Modes", "Context Managers", "Reading Files", "Writing Files", "Binary Files", "Temporary Files", "File Path Operations"] },
                    { name: "Serialization Formats", side: "left", children: ["JSON Module", "Pickle Module", "CSV Module", "XML Parsing", "YAML Processing", "Struct Module", "Protocol Buffers"] }
                ]
            },
            {
                name: "Modules and Packages", topics: [
                    { name: "Import System", side: "right", children: ["Module Creation", "Package Structure", "Init File", "Relative Imports", "Absolute Imports", "Import Hooks", "Importlib Module"] },
                    { name: "Distribution and Tools", side: "left", children: ["Pip Package Manager", "Virtual Environments", "Setup Tools", "Pyproject Toml", "Wheel Format", "Conda Environments", "Dependency Management"] }
                ]
            },
            {
                name: "Testing and Quality", topics: [
                    { name: "Testing Frameworks", side: "right", children: ["Unittest Module", "Pytest Framework", "Test Fixtures", "Mocking Objects", "Parameterized Tests", "Coverage Analysis", "Test Driven Development"] },
                    { name: "Code Quality", side: "left", children: ["Type Hints", "Mypy Checker", "Pylint Linter", "Black Formatter", "Docstring Standards", "Code Review Practices", "Static Analysis Tools"] }
                ]
            },
            {
                name: "Advanced Python Internals", topics: [
                    { name: "CPython Internals", side: "right", children: ["Bytecode Compilation", "Dis Module", "Code Objects", "Frame Objects", "Evaluation Loop", "Peephole Optimizer", "PEP Process"] },
                    { name: "Metaprogramming", side: "left", children: ["Inspect Module", "AST Module", "Exec and Eval", "Dynamic Attribute Access", "Import Machinery", "Monkey Patching", "Code Generation"] }
                ]
            },
            {
                name: "Context Managers and Protocols", topics: [
                    { name: "Context Manager Mechanics", side: "right", children: ["With Statement", "Enter Exit Methods", "Contextlib Module", "Contextmanager Decorator", "Async Context Managers", "Nested Contexts", "ExitStack Usage"] },
                    { name: "Protocols and ABCs", side: "left", children: ["Protocol Class", "Structural Subtyping", "Abstract Base Classes", "Virtual Subclasses", "Runtime Checkable", "Custom Protocols", "Collections ABCs"] }
                ]
            },
            {
                name: "Type System and Annotations", topics: [
                    { name: "Type Hints Basics", side: "right", children: ["Basic Annotations", "Optional Types", "Union Types", "Type Aliases", "Callable Types", "Literal Types", "Final Annotation"] },
                    { name: "Advanced Typing", side: "left", children: ["Generic Types", "TypeVar Usage", "ParamSpec", "TypeVarTuple", "Overload Decorator", "Type Guards", "Self Type"] }
                ]
            },
            {
                name: "Regular Expressions", topics: [
                    { name: "Pattern Syntax", side: "right", children: ["Basic Patterns", "Character Classes", "Quantifiers", "Anchors", "Groups and Captures", "Alternation", "Lookahead Lookbehind"] },
                    { name: "Re Module Usage", side: "left", children: ["Match Function", "Search Function", "Findall Function", "Sub and Subn", "Compile Function", "Flags and Options", "Named Groups"] }
                ]
            },
            {
                name: "Functional Programming", topics: [
                    { name: "Functional Concepts", side: "right", children: ["Pure Functions", "Immutability", "Map Function", "Filter Function", "Reduce Function", "Partial Application", "Function Composition"] },
                    { name: "Functools and Operator", side: "left", children: ["Functools Reduce", "Functools Partial", "Functools Cache", "LRU Cache Decorator", "Singledispatch", "Operator Module", "Total Ordering"] }
                ]
            },
            {
                name: "Networking and Web", topics: [
                    { name: "Socket Programming", side: "right", children: ["Socket Module", "TCP Sockets", "UDP Sockets", "Server Client Model", "Socket Timeout", "Non Blocking Sockets", "Select Module"] },
                    { name: "HTTP and Web", side: "left", children: ["Urllib Module", "Requests Library", "HTTP Methods", "REST API Consumption", "WSGI Protocol", "ASGI Protocol", "Web Frameworks Overview"] }
                ]
            },
            {
                name: "Database Integration", topics: [
                    { name: "Database Fundamentals", side: "right", children: ["SQLite3 Module", "Connection Management", "Cursor Operations", "Parameterized Queries", "Transaction Management", "Context Manager Usage", "Migration Concepts"] },
                    { name: "ORM and Advanced", side: "left", children: ["SQLAlchemy Core", "SQLAlchemy ORM", "Session Management", "Query Building", "Relationship Mapping", "Connection Pooling", "Async Database Access"] }
                ]
            },
            {
                name: "Design Patterns", topics: [
                    { name: "Creational and Structural", side: "right", children: ["Singleton Pattern", "Factory Pattern", "Builder Pattern", "Adapter Pattern", "Decorator Pattern", "Facade Pattern", "Proxy Pattern"] },
                    { name: "Behavioral Patterns", side: "left", children: ["Observer Pattern", "Strategy Pattern", "Command Pattern", "Iterator Pattern", "State Pattern", "Template Method", "Chain of Responsibility"] }
                ]
            },
            {
                name: "Standard Library Mastery", topics: [
                    { name: "OS and System", side: "right", children: ["Os Module", "Sys Module", "Pathlib Module", "Shutil Module", "Subprocess Module", "Platform Module", "Signal Handling"] },
                    { name: "Utilities and Data", side: "left", children: ["Collections Module", "Datetime Module", "Decimal Module", "Fractions Module", "Statistics Module", "Random Module", "Hashlib Module"] }
                ]
            },
            {
                name: "Performance Optimization", topics: [
                    { name: "Profiling and Benchmarking", side: "right", children: ["cProfile Module", "Line Profiler", "Timeit Module", "Memory Profiler", "Benchmark Strategies", "Flame Graphs", "Optimization Workflow"] },
                    { name: "Acceleration Techniques", side: "left", children: ["Cython Integration", "Numba JIT", "PyPy Runtime", "Vectorized Operations", "C Extensions Ctypes", "CFFI Library", "Shared Object Loading"] }
                ]
            },
            {
                name: "Security and Best Practices", topics: [
                    { name: "Secure Coding", side: "right", children: ["Input Validation", "SQL Injection Prevention", "Path Traversal Prevention", "Secrets Module", "Hashlib Usage", "HMAC Authentication", "Cryptography Library"] },
                    { name: "Code Best Practices", side: "left", children: ["PEP 8 Style Guide", "Clean Code Principles", "SOLID Principles", "DRY Principle", "Logging Standards", "Configuration Management", "Twelve Factor App"] }
                ]
            }
        ];

        function buildLeafGroup(topic) {
            var isRight = topic.side === "right";
            var groupClass = isRight ? "leaf-group right-group" : "leaf-group left-group";
            var bracketClass = isRight ? "bracket right-bracket" : "bracket left-bracket";
            var html = '<div class="' + groupClass + '">';
            if (isRight) {
                html += '<div class="' + bracketClass + '"><div class="v-line"></div><div class="h-arm"></div></div>';
                html += '<div class="leaves">';
            } else {
                html += '<div class="leaves">';
            }
            for (var i = 0; i < topic.children.length; i++) {
                html += '<div class="leaf">' + topic.children[i] + '</div>';
            }
            html += '</div>';
            if (!isRight) {
                html += '<div class="' + bracketClass + '"><div class="v-line"></div><div class="h-arm"></div></div>';
            }
            html += '</div>';
            return html;
        }

        function buildTopicRow(topic) {
            var isRight = topic.side === "right";
            var html = '<div class="topic-row">';
            html += '<div class="side left">';
            if (!isRight) {
                html += buildLeafGroup(topic);
                html += '<div class="node-connector"><div class="h-line"></div></div>';
            }
            html += '</div>';
            html += '<div class="center-col"><div class="yellow-node">' + topic.name + '</div></div>';
            html += '<div class="side right">';
            if (isRight) {
                html += '<div class="node-connector"><div class="h-line"></div></div>';
                html += buildLeafGroup(topic);
            }
            html += '</div>';
            html += '</div>';
            return html;
        }

        function render() {
            var spine = document.getElementById("spine");
            var html = "";
            for (var s = 0; s < sections.length; s++) {
                html += '<div class="section">';
                html += '<div class="section-label">' + sections[s].name + '</div>';
                for (var t = 0; t < sections[s].topics.length; t++) {
                    html += buildTopicRow(sections[s].topics[t]);
                }
                html += '</div>';
            }
            spine.innerHTML = html;
        }
        render();
    </script>
</body>

</html>
